# Project Configuration for AI Engineering Workflow
#
# This file contains project-specific settings that customize the
# generic workflow engine for your repository.
#
# Copy this file to your project and edit the values.

# ---------------------------------------------------------
# Protected paths (comma-separated)
# Files/directories that Claude must NOT modify during implementation.
# Engine-level protections (templates, commands, docs) are always active.
# Add your project-specific protected paths here.
# ---------------------------------------------------------
# PROTECTED_PATHS=packages/shared_contracts/src/main,packages/core/src/main

# ---------------------------------------------------------
# Build system (auto-detected if not set)
# Values: gradle, flutter, node, swift, openapi, unknown
# ---------------------------------------------------------
# BUILD_SYSTEM=gradle

# ---------------------------------------------------------
# Default package directory (used when stage package can't be resolved)
# ---------------------------------------------------------
# DEFAULT_PACKAGE=packages/core

# ---------------------------------------------------------
# Context files to exclude from ChatGPT/Gemini bundles
# (comma-separated basenames, e.g., large business docs)
# ---------------------------------------------------------
# CONTEXT_EXCLUDES=BUSINESS_PLAN.md,PRODUCT_STRATEGY.md

# ---------------------------------------------------------
# Stage package mapping file
# If your project uses a custom stage-to-package mapping,
# set the path here. Default: .ai/stage_package_map.sh
# ---------------------------------------------------------
# STAGE_PACKAGE_MAP=.ai/stage_package_map.sh
